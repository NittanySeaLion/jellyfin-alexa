services:
  jellyfin-alexa:
    build: .
    container_name: jellyfin-alexa
    restart: unless-stopped
    environment:
      - JELLYFIN_URL=${JELLYFIN_URL}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - JELLYFIN_USER_ID=${JELLYFIN_USER_ID}
      - PORT=${PORT:-1456}
    ports:
      - "1456:1456"
